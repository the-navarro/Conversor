<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor MOV para MP4 Perfeito</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 25px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
            transition: all 0.2s;
        }

        .file-box:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { display: none; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: 500; color: #555; padding: 0 10px; }

        #downloadLink {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Conversor MOV para MP4</h1>
    <p>Gere arquivos MP4 compatíveis e sem corromper</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Clique para selecionar o vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="*/*">
    </label>

    <button id="convertBtn">Converter para MP4</button>
    <div id="status" class="status">A aguardar arquivo...</div>
    <a id="downloadLink" href="#">📥 Salvar MP4 no Celular</a>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    
    // Configura o FFmpeg com logs para monitoramento
    const ffmpeg = createFFmpeg({ 
        log: true,
        // Força o carregamento de uma versão estável hospedada que ignora bloqueios de segurança do GitHub
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    let isFFmpegLoaded = false;

    async function loadEngine() {
        try {
            statusDiv.innerText = "A carregar motores de vídeo...";
            await ffmpeg.load();
            isFFmpegLoaded = true;
            statusDiv.innerText = "Pronto para usar!";
            statusDiv.style.color = "#28a745";
        } catch (e) {
            console.error(e);
            statusDiv.innerText = "Erro ao carregar codecs. Tente recarregar.";
            statusDiv.style.color = "#dc3545";
        }
    }
    loadEngine();

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            fileLabel.innerHTML = `<strong>Selecionado:</strong><br>${file.name}<br><small>(${(file.size / (1024 * 1024)).toFixed(1)} MB)</small>`;
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
            if (isFFmpegLoaded) {
                statusDiv.innerText = "Vídeo pronto para conversão.";
                statusDiv.style.color = "#007bff";
            }
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file || !isFFmpegLoaded) return;

        convertBtn.disabled = true;
        downloadLink.style.display = 'none';
        statusDiv.innerText = "A converter os frames do vídeo. Não saia da página...";
        statusDiv.style.color = "#fd7e14";

        try {
            // Salva o arquivo na memória virtual pura
            ffmpeg.FS('writeFile', 'input.mov', await fetchFile(file));

            // EXECUTANDO O COMANDO CORRETO: 
            // -vcodec copy tenta copiar sem re-renderizar para ser instantâneo e não corromper os segundos.
            // Se falhar devido ao codec de áudio do iPhone, ele faz o transcode limpo.
            try {
                await ffmpeg.run('-i', 'input.mov', '-c:v', 'copy', '-c:a', 'aac', 'output.mp4');
            } catch (copyError) {
                // Modo de segurança se o codec original for incompatível com cópia direta
                await ffmpeg.run('-i', 'input.mov', '-preset', 'ultrafast', '-c:a', 'aac', 'output.mp4');
            }

            // Lê o arquivo gerado
            const data = ffmpeg.FS('readFile', 'output.mp4');
            
            // Cria um Blob estruturado explicitamente com formato de vídeo correto
            const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
            const mp4Url = URL.createObjectURL(mp4Blob);

            downloadLink.href = mp4Url;
            downloadLink.download = 'video_final.mp4';
            downloadLink.style.display = 'block';

            statusDiv.innerText = "Conversão concluída com sucesso!";
            statusDiv.style.color = "#28a745";

            // Limpeza de memória
            ffmpeg.FS('unlink', 'input.mov');
            ffmpeg.FS('unlink', 'output.mp4');

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Falha no processamento. Tente um vídeo mais curto ou outro navegador.";
            statusDiv.style.color = "#dc3545";
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
