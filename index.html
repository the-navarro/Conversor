<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Nativo de Vídeo</title>
    <style>
        :root {
            --primary: #007bff;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
        }

        input[type="file"] { display: none; }

        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            margin-bottom: 20px;
            display: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: bold; }

        .download-btn {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor em Tempo Real</h1>
    <p>Escolha o ficheiro a partir de qualquer pasta do seu telemóvel.</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Selecionar vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="*/*">
    </label>

    <video id="vid" playsinline controls muted></video>

    <button id="convertBtn">Iniciar Conversão (Tocar Vídeo)</button>
    <div id="status" class="status"></div>
    <a id="downloadLink" class="download-btn" href="#">📥 Descarregar Vídeo</a>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const vid = document.getElementById('vid');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    let mediaRecorder;
    let recordedChunks = [];

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            fileLabel.innerHTML = `<strong>${file.name}</strong><br><small>${(file.size / (1024 * 1024)).toFixed(1)} MB</small>`;
            
            vid.src = URL.createObjectURL(file);
            vid.style.display = 'block';
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
            statusDiv.innerHTML = "Pronto. Clique no botão abaixo para gravar a conversão.";
            statusDiv.style.color = "#007bff";
            recordedChunks = [];
        }
    });

    convertBtn.addEventListener('click', () => {
        try {
            const stream = vid.captureStream ? vid.captureStream() : vid.mozCaptureStream();
            
            if (!stream) {
                statusDiv.innerText = "O seu navegador não suporta captura de fluxo.";
                statusDiv.style.color = "red";
                return;
            }

            // Descobre qual o formato que o seu telemóvel suporta gravar nativamente
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                
                // Define a extensão correta com base no que o Android gerou (evita o erro de download falhado)
                const extensao = mimeType.includes('webm') ? 'webm' : 'mp4';
                const nomeFicheiro = `video_convertido.${extensao}`;

                // TRUQUE ANTI-BLOQUEIO: Usa o FileReader para converter o vídeo para um URL de Dados (Base64)
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    downloadLink.href = reader.result;
                    downloadLink.download = nomeFicheiro;
                    downloadLink.style.display = 'block';
                    
                    statusDiv.innerHTML = `✅ Conversão concluída!<br><small style="color:#666;">Guardado como .${extensao} para garantir compatibilidade.</small>`;
                    statusDiv.style.color = "#28a745";
                    convertBtn.disabled = false;
                    convertBtn.innerText = "Converter Novamente";

                    // Inicia o download automaticamente!
                    downloadLink.click();
                };
            };

            mediaRecorder.start();
            vid.play();

            convertBtn.disabled = true;
            convertBtn.innerText = "A converter...";
            statusDiv.innerText = "A gravar... Deixe o vídeo reproduzir até ao fim.";
            statusDiv.style.color = "#fd7e14";

            vid.onended = () => {
                mediaRecorder.stop();
            };

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Erro ao iniciar conversão.";
            statusDiv.style.color = "red";
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
