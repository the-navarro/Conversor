<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor MOV para MP4 Definitivo</title>
    
    <script src="https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 25px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
            transition: all 0.2s;
        }

        .file-box:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { display: none; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: 500; color: #555; padding: 0 10px; }

        #downloadLink {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
        #downloadLink:hover { background-color: #218838; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Conversor MOV para MP4</h1>
    <p>Conversão real e estável para o GitHub Pages</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Clique para selecionar o vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="*/*">
    </label>

    <button id="convertBtn">Converter para MP4</button>
    <div id="status" class="status">A carregar o motor de conversão...</div>
    <a id="downloadLink" href="#">📥 Salvar MP4 no Celular</a>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    // Inicialização do motor com a segurança do coi-serviceworker ativa
    async function loadConversor() {
        try {
            await ffmpeg.load();
            statusDiv.innerText = "Pronto para usar! Escolha o seu vídeo.";
            statusDiv.style.color = "#28a745";
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "Erro ao carregar o motor. Recarregue a página.";
            statusDiv.style.color = "#dc3545";
        }
    }
    loadConversor();

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            fileLabel.innerHTML = `<strong>Selecionado:</strong><br>${file.name}<br><small>(${(file.size / (1024 * 1024)).toFixed(1)} MB)</small>`;
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
            statusDiv.innerText = "Vídeo carregado. Pronto para converter.";
            statusDiv.style.color = "#007bff";
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        downloadLink.style.display = 'none';
        statusDiv.innerText = "A converter... Por favor, aguarde alguns segundos.";
        statusDiv.style.color = "#fd7e14";

        try {
            // Escreve o ficheiro na memória do FFmpeg
            ffmpeg.FS('writeFile', 'input.mov', await fetchFile(file));

            // Transcodificação ultra rápida e universal para telemóveis (H.264 + AAC)
            // Mantém os segundos exatos do vídeo sem quebrar ou crashar
            await ffmpeg.run(
                '-i', 'input.mov', 
                '-c:v', 'libx264', 
                '-preset', 'ultrafast', 
                '-crf', '23', 
                '-c:a', 'aac', 
                'output.mp4'
            );

            // Lê o resultado gerado de forma binária
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
            
            // Cria a URL de transferência estável
            const url = URL.createObjectURL(mp4Blob);
            downloadLink.href = url;
            downloadLink.download = 'video_convertido.mp4';
            downloadLink.style.display = 'block';

            statusDiv.innerText = "Conversão concluída com sucesso!";
            statusDiv.style.color = "#28a745";

            // Limpa a memória virtual para não sobrecarregar o navegador
            ffmpeg.FS('unlink', 'input.mov');
            ffmpeg.FS('unlink', 'output.mp4');
        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Erro durante o processamento. Tente novamente.";
            statusDiv.style.color = "#dc3545";
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
