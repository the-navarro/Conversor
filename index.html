<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Nativo de Vídeo</title>
    <style>
        :root {
            --primary: #007bff;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
        }

        input[type="file"] { display: none; }

        /* O vídeo tem de ser visível para o navegador não o bloquear */
        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            margin-bottom: 20px;
            display: none;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: bold; }

        .download-btn {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor em Tempo Real</h1>
    <p>Grava o ficheiro nativamente para contornar limites do telemóvel.</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Selecionar vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="video/*">
    </label>

    <video id="vid" playsinline controls></video>

    <button id="convertBtn">Iniciar Conversão (Tocar Vídeo)</button>
    <div id="status" class="status"></div>
    <a id="downloadLink" class="download-btn" href="#">📥 Descarregar MP4</a>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const vid = document.getElementById('vid');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    let mediaRecorder;
    let recordedChunks = [];

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            fileLabel.innerHTML = `<strong>${file.name}</strong><br><small>${(file.size / (1024 * 1024)).toFixed(1)} MB</small>`;
            
            // Carrega o vídeo no ecrã
            vid.src = URL.createObjectURL(file);
            vid.style.display = 'block';
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
            statusDiv.innerText = "Pronto. Clique no botão abaixo para gravar a conversão.";
            statusDiv.style.color = "#007bff";
            recordedChunks = [];
        }
    });

    convertBtn.addEventListener('click', () => {
        try {
            // Captura o fluxo exato do vídeo que está a tocar no ecrã
            const stream = vid.captureStream ? vid.captureStream() : vid.mozCaptureStream();
            
            if (!stream) {
                statusDiv.innerText = "O seu navegador não suporta captura de fluxo.";
                statusDiv.style.color = "red";
                return;
            }

            // O Android Chrome prefere WebM, o Safari prefere MP4. 
            // O navegador escolhe o melhor e nós forçamos a extensão final para .mp4.
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                
                downloadLink.href = url;
                downloadLink.download = 'video_convertido.mp4';
                downloadLink.style.display = 'block';
                
                statusDiv.innerText = "✅ Conversão concluída!";
                statusDiv.style.color = "#28a745";
                convertBtn.disabled = false;
                convertBtn.innerText = "Converter Novamente";
            };

            // Inicia a gravação simultaneamente com o vídeo
            mediaRecorder.start();
            vid.play();

            convertBtn.disabled = true;
            convertBtn.innerText = "A converter...";
            statusDiv.innerText = "A gravar em tempo real. Deixe o vídeo tocar até ao fim!";
            statusDiv.style.color = "#fd7e14";

            // Para a gravação automaticamente quando o vídeo acabar
            vid.onended = () => {
                mediaRecorder.stop();
            };

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Erro ao iniciar. Certifique-se de que não tem o telemóvel no modo de poupança de energia.";
            statusDiv.style.color = "red";
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
