<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor MOV para MP4 Estável</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 25px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
            transition: all 0.2s;
        }

        .file-box:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { display: none; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: 500; color: #555; padding: 0 10px; word-wrap: break-word; }

        #downloadLink {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor MOV para MP4</h1>
    <p>Versão compatível com GitHub Pages</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Clique para selecionar o vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="*/*">
    </label>

    <button id="convertBtn">Converter para MP4</button>
    <div id="status" class="status">Iniciando sistema...</div>
    <a id="downloadLink" href="#">📥 Salvar MP4 no Celular</a>
</div>

<script type="module">
    // Utilizando os scripts compilados para compatibilidade sem COOP/COEP (Single-Thread isolado)
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const ffmpeg = new FFmpeg();
    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    async function init() {
        try {
            statusDiv.innerText = "Carregando codecs...";
            // Força o carregamento de servidores CDN espelhados e estáveis que mitigam erros no GitHub Pages
            const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.12.4/dist/esm';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            statusDiv.innerText = "Pronto para converter!";
            statusDiv.style.color = "#28a745";
        } catch (err) {
            console.error("Erro no carregamento primário:", err);
            statusDiv.innerText = "Tentando servidor alternativo...";
            try {
                // Servidor de contingência caso o jsdelivr falhe no celular
                const altURL = 'https://unpkg.com/@ffmpeg/core-st@0.12.4/dist/esm';
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${altURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${altURL}/ffmpeg-core.wasm`, 'application/wasm'),
                });
                statusDiv.innerText = "Pronto para usar (Servidor B)!";
                statusDiv.style.color = "#28a745";
            } catch (altErr) {
                statusDiv.innerText = "Navegador bloqueou os recursos de vídeo. Tente usar o Chrome ou Firefox no celular.";
                statusDiv.style.color = "#dc3545";
            }
        }
    }
    init();

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            fileLabel.innerHTML = `<strong>Selecionado:</strong><br>${file.name}<br><small>(${(file.size / (1024 * 1024)).toFixed(1)} MB)</small>`;
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
        }
    });

    convertBtn.addEventListener('click', async () => {
        const file = videoInput.files[0];
        if (!file) return;

        convertBtn.disabled = true;
        downloadLink.style.display = 'none';
        statusDiv.innerText = "Convertendo... Aguarde alguns instantes.";
        statusDiv.style.color = "#fd7e14";

        try {
            // Escreve em formato limpo
            await ffmpeg.writeFile('input.mov', await fetchFile(file));

            // Ajuste fino nos parâmetros do FFmpeg para máxima velocidade e menor consumo de RAM no celular
            // Força codificação rápida ignorando perfis pesados
            await ffmpeg.exec([
                '-i', 'input.mov',
                '-c:v', 'libx264',
                '-preset', 'ultrafast',
                '-crf', '28',
                '-c:a', 'aac',
                '-strict', 'experimental',
                'output.mp4'
            ]);

            const data = await ffmpeg.readFile('output.mp4');
            const dataBlob = new Blob([data.buffer], { type: 'video/mp4' });
            
            const url = URL.createObjectURL(dataBlob);
            downloadLink.href = url;
            downloadLink.download = 'video_convertido.mp4';
            downloadLink.style.display = 'block';

            statusDiv.innerText = "Sucesso! Clique abaixo para baixar.";
            statusDiv.style.color = "#28a745";
        } catch (error) {
            console.error("Erro na conversão:", error);
            statusDiv.innerText = "Erro ao processar os frames do vídeo. Tente novamente.";
            statusDiv.style.color = "#dc3545";
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
