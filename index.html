<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Vídeo Ultra Rápido</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --background: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        .file-box {
            border: 2px dashed #b7bcbf;
            padding: 25px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: #fafafa;
            margin-bottom: 20px;
            display: block;
            transition: all 0.2s;
        }

        .file-box:hover { border-color: var(--primary); background: #f0f7ff; }
        input[type="file"] { display: none; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .status { margin-top: 15px; font-size: 14px; font-weight: 500; color: #28a745; padding: 0 10px; }

        #downloadLink {
            display: none;
            margin-top: 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
        
        /* Elementos ocultos usados para o processamento nativo */
        #hiddenVideo, #hiddenCanvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor MOV para MP4</h1>
    <p>Versão Nativa (Sem travamentos e 100% compatível)</p>

    <label class="file-box" for="videoInput">
        <span id="fileLabel">📱 Clique para selecionar o vídeo (.MOV)</span>
        <input type="file" id="videoInput" accept="*/*">
    </label>

    <button id="convertBtn">Converter para MP4</button>
    <div id="status" class="status">Pronto para usar!</div>
    <a id="downloadLink" href="#">📥 Salvar MP4 no Celular</a>

    <video id="hiddenVideo" muted playsinline></video>
    <canvas id="hiddenCanvas"></canvas>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const fileLabel = document.getElementById('fileLabel');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('hiddenCanvas');
    const ctx = canvas.getContext('2d');

    let videoFile = null;

    videoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            videoFile = file;
            fileLabel.innerHTML = `<strong>Selecionado:</strong><br>${file.name}<br><small>(${(file.size / (1024 * 1024)).toFixed(1)} MB)</small>`;
            convertBtn.style.display = 'block';
            downloadLink.style.display = 'none';
            statusDiv.innerText = "Vídeo carregado com sucesso!";
            statusDiv.style.color = "#007bff";
        }
    });

    convertBtn.addEventListener('click', () => {
        if (!videoFile) return;

        convertBtn.disabled = true;
        downloadLink.style.display = 'none';
        statusDiv.innerText = "A processar vídeo na velocidade nativa do telemóvel...";
        statusDiv.style.color = "#fd7e14";

        const fileURL = URL.createObjectURL(videoFile);
        video.src = fileURL;

        video.onloadedmetadata = function() {
            // Ajusta o tamanho do canvas interno para a resolução real do vídeo original
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Configura a captura nativa do fluxo do canvas (30 frames por segundo)
            const stream = canvas.captureStream(30);
            
            // Define o tipo de saída suportado amplamente por navegadores móveis (MP4/WebM híbrido estável)
            let options = { mimeType: 'video/mp4;codecs=h264' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm;codecs=h264' };
            }
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' }; 
            }

            const mediaRecorder = new MediaRecorder(stream, options);
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                // Cria o arquivo final pronto para download
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const outputURL = URL.createObjectURL(blob);
                
                downloadLink.href = outputURL;
                downloadLink.download = 'video_convertido.mp4';
                downloadLink.style.display = 'block';
                
                statusDiv.innerText = "Conversão concluída com sucesso!";
                statusDiv.style.color = "#28a745";
                convertBtn.disabled = false;

                // Limpa caches de memória
                URL.revokeObjectURL(fileURL);
            };

            // Inicia a gravação interna
            mediaRecorder.start();
            video.play();

            // Executa o desenho de cada frame em tempo de execução nativo
            function drawFrame() {
                if (!video.paused && !video.ended) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(drawFrame);
                } else if (video.ended) {
                    mediaRecorder.stop();
                }
            }
            drawFrame();
        };

        video.onerror = function() {
            statusDiv.innerText = "Erro ao ler formato de vídeo original. Certifique-se de que é um arquivo válido.";
            statusDiv.style.color = "#dc3545";
            convertBtn.disabled = false;
        };
    });
</script>

</body>
</html>
